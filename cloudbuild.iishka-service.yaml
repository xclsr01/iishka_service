substitutions:
  _REGION: asia-southeast1
  _SERVICE: iishka-service
  _REPO: iishka-service

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}

  - name: node:22-slim
    entrypoint: bash
    secretEnv:
      - DIRECT_URL
    args:
      - -lc
      - |
        npm ci --workspace backend
        export DATABASE_URL="$$DIRECT_URL"
        export MIGRATION_DATABASE_URL="$$DIRECT_URL"
        npm run db:deploy --workspace backend

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --region
      - ${_REGION}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/DIRECT_URL/versions/latest
      env: DIRECT_URL
